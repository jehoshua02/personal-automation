<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: monospace; max-width: 800px; margin: 0 auto; padding: 20px; background: #1a1a1a; color: #e0e0e0; }
        h1 { margin-bottom: 20px; font-size: 1.2em; }
        form { display: flex; gap: 10px; margin-bottom: 10px; }
        input[type="text"] { flex: 1; padding: 10px; font-family: monospace; font-size: 1em; background: #222; color: #e0e0e0; border: 1px solid #333; }
        button { padding: 10px 15px; font-family: monospace; font-size: 1em; background: #333; color: #e0e0e0; border: 1px solid #555; cursor: pointer; }
        button:hover { background: #444; }
        .task { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #333; }
        .task.completed .task-title { text-decoration: line-through; color: #666; }
        .task-title { flex: 1; }
        .task-labels { display: flex; gap: 4px; }
        .label-tag { background: #335; color: #aaf; padding: 2px 6px; font-size: 0.8em; border-radius: 3px; }
        .task-actions button { padding: 5px 10px; font-size: 0.9em; }
        .btn-complete { color: #6f6; border-color: #6f6; }
        .btn-delete { color: #f66; border-color: #f66; }
        .btn-undo { color: #ff6; border-color: #ff6; }
        #task-list { border: 1px solid #333; min-height: 100px; background: #111; }
        .empty { padding: 20px; color: #666; text-align: center; }
        .bar { margin-bottom: 10px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .bar-label { color: #888; font-size: 0.85em; margin-right: 4px; }
        .filter-btn { padding: 4px 10px; font-size: 0.9em; }
        .filter-btn.active { background: #446; border-color: #88f; color: #aaf; }
        .list-btn { padding: 6px 12px; font-size: 1em; }
        .list-btn.active { background: #464; border-color: #8f8; color: #afa; }
    </style>
</head>
<body>
    <h1>Tasks</h1>
    <div class="bar" id="lists"><span class="bar-label">Lists:</span></div>
    <form id="add-form">
        <input type="text" id="title" placeholder="New task..." autocomplete="off" />
        <input type="text" id="labels" placeholder="Labels (comma sep)" style="max-width: 200px;" />
        <button type="submit">Add</button>
    </form>
    <div class="bar" id="filters"><span class="bar-label">Labels:</span></div>
    <div id="task-list"></div>
    <script>
        const API = "{{ task_service_url }}";
        const taskList = document.getElementById("task-list");
        const filtersDiv = document.getElementById("filters");
        const listsDiv = document.getElementById("lists");
        const form = document.getElementById("add-form");
        const titleInput = document.getElementById("title");
        const labelsInput = document.getElementById("labels");
        let activeLabel = null;
        let activeList = "Inbox";
        let allLists = [];

        async function loadLists() {
            const resp = await fetch(API + "/lists");
            const lists = await resp.json();
            allLists = lists;
            listsDiv.innerHTML = '<span class="bar-label">Lists:</span>' +
                lists.map(l =>
                    '<button class="list-btn ' + (activeList === l.name ? 'active' : '') + '" onclick="setList(\'' + l.name.replace(/'/g, "\\'") + '\')">' + l.name.replace(/</g, "&lt;") + '</button>'
                ).join("") +
                '<button class="list-btn" onclick="setList(null)">All</button>';
        }

        async function loadLabels() {
            const resp = await fetch(API + "/labels");
            const labels = await resp.json();
            filtersDiv.innerHTML = '<span class="bar-label">Labels:</span>' +
                '<button class="filter-btn ' + (activeLabel === null ? 'active' : '') + '" onclick="setLabel(null)">All</button>' +
                labels.map(l =>
                    '<button class="filter-btn ' + (activeLabel === l.name ? 'active' : '') + '" onclick="setLabel(\'' + l.name.replace(/'/g, "\\'") + '\')">' + l.name.replace(/</g, "&lt;") + '</button>'
                ).join("");
        }

        function setLabel(label) {
            activeLabel = label;
            loadLabels();
            loadTasks();
        }

        function setList(list) {
            activeList = list;
            loadLists();
            loadTasks();
        }

        async function loadTasks() {
            const params = new URLSearchParams();
            if (activeLabel) params.set("label", activeLabel);
            if (activeList) params.set("list", activeList);
            const url = API + "/tasks" + (params.toString() ? "?" + params : "");
            const resp = await fetch(url);
            const tasks = await resp.json();
            if (tasks.length === 0) {
                taskList.innerHTML = '<div class="empty">No tasks</div>';
                return;
            }
            taskList.innerHTML = tasks.map(t => {
                const completed = t.completed_at !== null;
                const labelsHtml = t.labels.map(l => '<span class="label-tag">' + l.replace(/</g, "&lt;") + '</span>').join("");
                const moveOptions = allLists.filter(l => l.name !== t.list).map(l =>
                    '<option value="' + l.name.replace(/"/g, "&quot;") + '">' + l.name.replace(/</g, "&lt;") + '</option>'
                ).join("");
                const moveHtml = moveOptions ? '<select onchange="moveTask(' + t.id + ', this.value)" style="font-family:monospace;font-size:0.85em;background:#222;color:#e0e0e0;border:1px solid #555;padding:2px;"><option value="">Move...</option>' + moveOptions + '</select>' : '';
                return '<div class="task ' + (completed ? 'completed' : '') + '" data-id="' + t.id + '">' +
                    '<span class="task-title">' + t.title.replace(/</g, "&lt;") + '</span>' +
                    (labelsHtml ? '<span class="task-labels">' + labelsHtml + '</span>' : '') +
                    '<span class="task-actions">' +
                        moveHtml +
                        (completed
                            ? '<button class="btn-undo" onclick="toggleComplete(' + t.id + ', true)">Undo</button>'
                            : '<button class="btn-complete" onclick="toggleComplete(' + t.id + ', false)">Done</button>'
                        ) +
                        '<button class="btn-delete" onclick="deleteTask(' + t.id + ')">Delete</button>' +
                    '</span>' +
                '</div>';
            }).join("");
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const title = titleInput.value.trim();
            if (!title) return;
            const labelStr = labelsInput.value.trim();
            const labels = labelStr ? labelStr.split(",").map(l => l.trim()).filter(l => l) : [];
            const body = {title, labels};
            if (activeList) body.list = activeList;
            await fetch(API + "/tasks", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(body),
            });
            titleInput.value = "";
            labelsInput.value = "";
            loadLists();
            loadLabels();
            loadTasks();
        });

        async function toggleComplete(id, undo) {
            await fetch(API + "/tasks/" + id, {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({completed_at: undo ? null : new Date().toISOString()}),
            });
            loadTasks();
        }

        async function moveTask(id, list) {
            if (!list) return;
            await fetch(API + "/tasks/" + id, {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({list}),
            });
            loadTasks();
        }

        async function deleteTask(id) {
            await fetch(API + "/tasks/" + id, {method: "DELETE"});
            loadTasks();
        }

        loadLists();
        loadLabels();
        loadTasks();
    </script>
</body>
</html>
