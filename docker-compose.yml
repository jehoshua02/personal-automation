services:
  auth:
    build: ./services/auth
    ports:
      - "8080:8080"
    volumes:
      - ./secrets/google_oauth_client_secret.json:/secrets/client_secret.json:ro
      - auth-data:/data
    environment:
      - OAUTH_CONFIG_PATH=/secrets/client_secret.json
      - OAUTH_TOKEN_PATH=/data/token.json

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  gmail-reader:
    build: ./services/gmail-reader
    ports:
      - "8081:8081"
    environment:
      - AUTH_SERVICE_URL=http://auth:8080
    depends_on:
      - auth

  llm-processor:
    build: ./services/llm-processor
    ports:
      - "8082:8082"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - LLM_MODEL=llama3.1:8b
    depends_on:
      - ollama

  task-writer:
    build: ./services/task-writer
    ports:
      - "8083:8083"
    environment:
      - AUTH_SERVICE_URL=http://auth:8080
    depends_on:
      - auth

  calendar-writer:
    build: ./services/calendar-writer
    ports:
      - "8084:8084"
    environment:
      - AUTH_SERVICE_URL=http://auth:8080
      - CALENDAR_ID=${CALENDAR_ID:-primary}
    depends_on:
      - auth

  note-writer:
    build: ./services/note-writer
    ports:
      - "8085:8085"
    volumes:
      - ./notes:/data/notes

  email-filter:
    build: ./services/email-filter
    ports:
      - "8087:8087"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - LLM_MODEL=llama3.1:8b
      - WHITELIST_PATH=/config/whitelist.json
    volumes:
      - ./services/email-filter/whitelist.json:/config/whitelist.json:ro
    depends_on:
      - ollama

  orchestrator:
    build: ./services/orchestrator
    ports:
      - "8086:8086"
    environment:
      - GMAIL_READER_URL=http://gmail-reader:8081
      - LLM_PROCESSOR_URL=http://llm-processor:8082
      - TASK_WRITER_URL=http://task-writer:8083
      - CALENDAR_WRITER_URL=http://calendar-writer:8084
      - NOTE_WRITER_URL=http://note-writer:8085
    depends_on:
      - gmail-reader
      - llm-processor
      - task-writer
      - calendar-writer
      - note-writer

  e2e-tests:
    build: ./tests/e2e
    profiles:
      - test
    depends_on:
      - orchestrator

volumes:
  auth-data:
  ollama-data:
